name: Release packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package (tag or commit SHA)
        required: true
        type: string
      version:
        description: GUI version without the v prefix
        required: true
        type: string
      wsfs_core_tag:
        description: Published Kodecable/wsfs-core release tag
        required: true
        type: string
      release_tag:
        description: Tag for the draft GUI GitHub Release
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.values.outputs.ref }}
      version: ${{ steps.values.outputs.version }}
      core_tag: ${{ steps.values.outputs.core_tag }}
      release_tag: ${{ steps.values.outputs.release_tag }}
      qt_version: ${{ steps.values.outputs.qt_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      - id: values
        shell: bash
        run: |
          set -euo pipefail
          source release/versions.env
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
            ref="${GITHUB_SHA}"
            version="${GITHUB_REF_NAME#v}"
            core_tag="${WSFS_CORE_TAG}"
            release_tag="${GITHUB_REF_NAME}"
          else
            ref="${{ inputs.ref }}"
            version="${{ inputs.version }}"
            core_tag="${{ inputs.wsfs_core_tag }}"
            release_tag="${{ inputs.release_tag }}"
            [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo 'release_tag must be vX.Y.Z' >&2; exit 1; }
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "core_tag=${core_tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "qt_version=${QT_VERSION}" >> "$GITHUB_OUTPUT"

  linux-appimage:
    needs: resolve
    runs-on: ubuntu-24.04
    container: ubuntu:20.04
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Check out source and install build tools
        shell: bash
        env:
          QT_VERSION: ${{ needs.resolve.outputs.qt_version }}
          SOURCE_REF: ${{ needs.resolve.outputs.ref }}
        run: |
          set -euo pipefail
          apt-get update
          # Runtime libraries required by Qt's XCB and Wayland platform plugins.
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates curl file git imagemagick patchelf python3 python3-pip \
            libdbus-1-3 libegl1 libfontconfig1 libfreetype6 libgl1 libglx0 libopengl0 \
            libice6 libsecret-1-dev libsm6 libx11-6 libx11-xcb1 libxext6 libxrender1 \
            libwayland-client0 libwayland-cursor0 libwayland-egl1 libwayland-server0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-render0 libxcb-shape0 libxcb-shm0 libxcb-sync1 \
            libxcb-util1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon0 libxkbcommon-x11-0
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$SOURCE_REF"
          git -C "$GITHUB_WORKSPACE" checkout --detach FETCH_HEAD
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive
          pip3 install 'aqtinstall==3.1.18'
          aqt install-qt linux desktop "${QT_VERSION}" linux_gcc_64 --outputdir "$RUNNER_TEMP/Qt"
          test -x "$RUNNER_TEMP/Qt/${QT_VERSION}/gcc_64/bin/qmake"
          qt_root="$RUNNER_TEMP/Qt/${QT_VERSION}/gcc_64"
          platform_plugin_dir="$qt_root/plugins/platforms"
          export LD_LIBRARY_PATH="$qt_root/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          for plugin in libqxcb.so libqwayland-egl.so libqwayland-generic.so; do
            plugin_path="$platform_plugin_dir/$plugin"
            test -f "$plugin_path" || { echo "Required Qt platform plugin is missing: $plugin_path" >&2; exit 1; }
            missing="$(ldd "$plugin_path" | awk '$2 == "=>" && $3 == "not" && $4 == "found" { print $1 }')"
            test -z "$missing" || { echo "Unresolved dependencies in $plugin: $missing" >&2; exit 1; }
          done
          echo "$RUNNER_TEMP/Qt/${QT_VERSION}/gcc_64/bin" >> "$GITHUB_PATH"
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Fetch linuxdeploy and Qt plugin
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/linuxdeploy"
          curl -L --fail -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy.AppImage" https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          curl -L --fail -o "$RUNNER_TEMP/linuxdeploy/linuxdeploy-plugin-qt.AppImage" https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/linuxdeploy"/*.AppImage
      - name: Build AppImage
        shell: bash
        env:
          # Run AppImages by extracting them instead of requiring FUSE in the container.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          LINUXDEPLOY: ${{ runner.temp }}/linuxdeploy/linuxdeploy.AppImage
          # The ubuntu:20.04 container runs as root; explicitly allow xmake in this ephemeral build environment.
          XMAKE_ROOT: y
        run: bash release/linux/build-appimage.sh "${{ needs.resolve.outputs.version }}" "${{ needs.resolve.outputs.core_tag }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  windows-installer:
    needs: resolve
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          submodules: recursive
      - name: Install Qt and Qt Installer Framework
        shell: pwsh
        env:
          QT_VERSION: ${{ needs.resolve.outputs.qt_version }}
        run: |
          python -m pip install 'aqtinstall==3.1.18'
          aqt install-qt windows desktop "$env:QT_VERSION" win64_msvc2022_64 --outputdir "$env:RUNNER_TEMP/Qt"
          if ($LASTEXITCODE -ne 0) { throw "Installing Qt failed" }
          if ($null -eq (Get-ChildItem -Path "$env:RUNNER_TEMP/Qt" -Filter "windeployqt.exe" -Recurse -File | Select-Object -First 1)) {
            throw "Qt installation completed without windeployqt.exe"
          }
          $qmake = Get-ChildItem -Path "$env:RUNNER_TEMP/Qt" -Filter "qmake.exe" -Recurse -File | Select-Object -First 1
          if ($null -eq $qmake) { throw "Qt installation completed without qmake.exe" }
          $qtSdkDir = $qmake.Directory.Parent.FullName
          Add-Content -Path $env:GITHUB_PATH -Value $qmake.Directory.FullName
          Add-Content -Path $env:GITHUB_ENV -Value "QTDIR=$qtSdkDir"
          aqt install-tool windows desktop tools_ifw --outputdir "$env:RUNNER_TEMP/QtTools"
          if ($LASTEXITCODE -ne 0) { throw "Installing Qt Installer Framework failed" }
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Build Qt Installer Framework package
        shell: pwsh
        run: |
          release/windows/build-installer.ps1 `
            -GuiVersion "${{ needs.resolve.outputs.version }}" `
            -CoreTag "${{ needs.resolve.outputs.core_tag }}" `
            -QtRoot "$env:RUNNER_TEMP/Qt" `
            -IfwRoot "$env:RUNNER_TEMP/QtTools"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-installer/*.exe

  create-draft-release:
    needs: [resolve, linux-appimage, windows-installer]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f \( -name '*.AppImage' -o -name '*.exe' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Create or update draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.exe
            release-assets/SHA256SUMS.txt
