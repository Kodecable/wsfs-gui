name: Release packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package (tag or commit SHA)
        required: true
        type: string
      version:
        description: GUI version without the v prefix
        required: true
        type: string
      wsfs_core_tag:
        description: Published Kodecable/wsfs-core release tag
        required: true
        type: string
      release_tag:
        description: Tag for the draft GUI GitHub Release
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.values.outputs.ref }}
      version: ${{ steps.values.outputs.version }}
      core_tag: ${{ steps.values.outputs.core_tag }}
      release_tag: ${{ steps.values.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      - id: values
        shell: bash
        run: |
          set -euo pipefail
          source release/versions.env
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
            ref="${GITHUB_SHA}"
            version="${GITHUB_REF_NAME#v}"
            core_tag="${WSFS_CORE_TAG}"
            release_tag="${GITHUB_REF_NAME}"
          else
            ref="${{ inputs.ref }}"
            version="${{ inputs.version }}"
            core_tag="${{ inputs.wsfs_core_tag }}"
            release_tag="${{ inputs.release_tag }}"
            [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo 'release_tag must be vX.Y.Z' >&2; exit 1; }
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "core_tag=${core_tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  linux-appimage:
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build the Arch packaging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: release/linux/Containerfile
          tags: wsfs-gui-appimage-builder:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build AppImage
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/wsfs-gui-home \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            wsfs-gui-appimage-builder:ci \
            bash release/linux/build-appimage.sh "${{ needs.resolve.outputs.version }}" "${{ needs.resolve.outputs.core_tag }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  windows-installer:
    needs: resolve
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          submodules: recursive
      - name: Install Craft and the KDE Breeze runtime
        shell: pwsh
        run: |
          $craftRoot = Join-Path $env:RUNNER_TEMP "CraftRoot"
          release/windows/install-craft-runtime.ps1 -CraftRoot $craftRoot
          Add-Content -Path $env:GITHUB_ENV -Value "WSFS_GUI_CRAFT_ROOT=$craftRoot"
      - name: Install Qt Installer Framework
        shell: pwsh
        run: |
          python -m pip install 'aqtinstall==3.1.18'
          aqt install-tool windows desktop tools_ifw --outputdir "$env:RUNNER_TEMP/QtTools"
          if ($LASTEXITCODE -ne 0) { throw "Installing Qt Installer Framework failed" }
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Build Qt Installer Framework package
        shell: pwsh
        run: |
          release/windows/build-installer.ps1 `
            -GuiVersion "${{ needs.resolve.outputs.version }}" `
            -CoreTag "${{ needs.resolve.outputs.core_tag }}" `
            -CraftRoot "$env:WSFS_GUI_CRAFT_ROOT" `
            -IfwRoot "$env:RUNNER_TEMP/QtTools"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-installer/*.exe

  create-draft-release:
    needs: [resolve, linux-appimage, windows-installer]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f \( -name '*.AppImage' -o -name '*.exe' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Create or update draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.exe
            release-assets/SHA256SUMS.txt
